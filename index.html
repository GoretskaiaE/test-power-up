<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>HR Dashboard Power-Up</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
<script>
  /* ============================================
     HR Dashboard Power-Up — Connector v5
     Authorization re-added for custom fields
     (used by the "Hired vs. Remaining" dashboard)
  ============================================ */

  var BASE_URL = window.location.origin + window.location.pathname.replace('index.html', '');

  window.TrelloPowerUp.initialize({

    // ── Board button ─────────────────────────────────────────────
    'board-buttons': function(t, options) {
      return [{
        icon: BASE_URL + 'icon.svg',
        text: 'HR Dashboard',
        callback: function(t) {
          return t.modal({
            title:      'HR Dashboard v5',
            url:        BASE_URL + 'dashboard.html',
            height:     520,
            fullscreen: false
          });
        }
      }];
    },

    // ── Auth status ──────────────────────────────────────────────
    // Returns { authorized: true/false } so Trello shows/hides
    // the "Authorize Account" prompt in the Power-Up gear menu.
    'authorization-status': function(t, options) {
      return t.getRestApi().then(function(restApi) {
        return restApi.isAuthorized().then(function(isAuthorized) {
          return { authorized: isAuthorized };
        });
      });
    },

    // ── Show authorization ───────────────────────────────────────
    // Opens authorize.html as a popup when user clicks
    // "Authorize Account" in the gear menu.
    'show-authorization': function(t, options) {
      return t.popup({
        title:  'Authorize HR Dashboard',
        url:    BASE_URL + 'authorize.html',
        height: 220
      });
    }

  });
</script>
</body>
</html>
