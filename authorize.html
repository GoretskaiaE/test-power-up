<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>HR Dashboard — Authorize</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f5f7;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 10px;
      padding: 32px 28px;
      max-width: 380px;
      width: 100%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      text-align: center;
    }
    .icon { font-size: 40px; margin-bottom: 16px; }
    h1 { font-size: 16px; font-weight: 700; color: #172b4d; margin-bottom: 10px; }
    p { font-size: 13px; color: #6b778c; line-height: 1.6; margin-bottom: 24px; }
    button {
      background: #0052cc;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 10px 22px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background 0.15s;
    }
    button:hover { background: #0747a6; }
    .status { margin-top: 14px; font-size: 12px; color: #6b778c; min-height: 18px; }
    .status.error { color: #ca3521; font-weight: 600; }

    /* Success confirmation banner (shown after authorization) */
    .banner {
      display: none;
      align-items: center;
      gap: 10px;
      background: #e3fcef;
      border: 1px solid #79f2c0;
      color: #006644;
      border-radius: 8px;
      padding: 14px 16px;
      margin-top: 4px;
      font-size: 13px;
      font-weight: 600;
      text-align: left;
    }
    .banner.show { display: flex; }
    .banner .check {
      flex-shrink: 0;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: #36b37e;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="icon">🔑</div>
  <h1>Authorize HR Dashboard</h1>
  <p id="intro">
    To load <strong>Hired vs. Remaining</strong> data, the Power-Up needs
    permission to read custom fields from your Trello board.
  </p>
  <button id="auth-btn">Authorize with Trello</button>
  <div class="status" id="status"></div>
  <div class="banner" id="banner">
    <span class="check">✓</span>
    <span>Authorized! The dashboard can now read your board data — you can close this window.</span>
  </div>
</div>

<script>
  const t = window.TrelloPowerUp.iframe({
    appKey:  '8b05c6c33e07f45582b9d6bcfa9d5e17',
    appName: 'HR Dashboard v8'
  });

  // Named statusEl, not status: a global `status` binding shadows/clashes with
  // window.status (a string property), which bit us when this was a `var`.
  const btn      = document.getElementById('auth-btn');
  const statusEl = document.getElementById('status');
  const banner   = document.getElementById('banner');
  const intro    = document.getElementById('intro');

  function showAuthorized() {
    intro.style.display  = 'none';
    btn.style.display    = 'none';
    statusEl.textContent = '';
    banner.classList.add('show');
  }

  function showDenied(msg) {
    statusEl.textContent = msg;
    statusEl.classList.add('error');
    btn.textContent = 'Authorize with Trello';
    btn.disabled    = false;
  }

  btn.addEventListener('click', function() {
    btn.textContent    = 'Authorizing…';
    btn.disabled       = true;
    statusEl.textContent = '';
    statusEl.classList.remove('error');

    const restApi = t.getRestApi();
    const key     = '8b05c6c33e07f45582b9d6bcfa9d5e17';

    // Clear any previously stored token FIRST so the result reflects only this
    // attempt (authorize() resolves even on "Deny").
    restApi.clearToken()
      .then(function() {
        return restApi.authorize({ scope: 'read', expiration: '30days' });
      })
      .then(function() {
        return restApi.getToken();
      })
      .then(function(token) {
        // isAuthorized() only checks the LOCAL token store, which can read as
        // "authorized" even when the server granted nothing (e.g. after Deny),
        // which is why Settings → Applications shows no token. Validate the
        // token against the server so the banner matches reality.
        if (!token) return false;
        return fetch('https://api.trello.com/1/members/me?fields=id&key=' + key + '&token=' + token)
          .then(function(r) { return r.ok; });
      })
      .then(function(valid) {
        if (valid) {
          showAuthorized();
        } else {
          showDenied('❌ Authorization was denied. Please try again.');
        }
      })
      .catch(function(err) {
        showDenied('❌ Authorization failed. Please try again.');
        console.error(err);
      });
  });
</script>
</body>
</html>
